<head>
  <link href="http://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/public/css/poole.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/public/css/syntax.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/public/css/hyde.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/public/css/custom.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap">


 <!-- Icons -->
<link rel="icon" type="image/ico" href="{{ '/public/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/public/apple-touch-icon-144-precomposed.png' | relative_url }}">


  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">

<script>
document.addEventListener("DOMContentLoaded", function () {
  const body = document.body;
  const toggle = document.getElementById("theme-toggle");

  // Load saved theme
  const saved = localStorage.getItem("theme");
  if (saved) {
    body.className = saved;
  }

  // Toggle theme
  toggle.addEventListener("click", function () {
    if (body.classList.contains("theme-light")) {
      body.classList.replace("theme-light", "theme-dark");
      localStorage.setItem("theme", "theme-dark");
    } else {
      body.classList.replace("theme-dark", "theme-light");
      localStorage.setItem("theme", "theme-light");
    }
  });
});
</script>


</head>
